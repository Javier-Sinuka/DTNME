name: SonarQube Cloud

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  build-test-sonar:
    name: Build, tests, coverage and SonarQube Cloud
    runs-on: ubuntu-22.04

    env:
      BUILD_WRAPPER_OUT_DIR: build-wrapper-output
      REPORTS_DIR: reports
      BUILD_JOBS: 2

      # RPC/XDR requerido por OASYS en Ubuntu moderno.
      CPPFLAGS: "-I/usr/include/tirpc"
      LIBS: "-ltirpc"

      # Coverage.
      COVERAGE_FLAGS: "--coverage -O0 -g"

      # Mientras estabilizamos el pipeline, no hacemos fallar el CI por tests individuales.
      FAIL_ON_TEST_FAILURE: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          set -e

          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            gcc \
            g++ \
            make \
            autoconf \
            automake \
            autotools-dev \
            libtool \
            m4 \
            pkg-config \
            bison \
            flex \
            swig \
            python3 \
            python3-pip \
            tcl \
            tcl-dev \
            tk \
            tk-dev \
            libboost-all-dev \
            libdb-dev \
            libdb++-dev \
            libreadline-dev \
            libxerces-c-dev \
            zlib1g-dev \
            libssl-dev \
            libbluetooth-dev \
            libtirpc-dev \
            rpcsvc-proto

          python3 -m pip install --user --upgrade "gcovr>=8.0"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Patch DTNME source compatibility
        run: |
          set -e

          python3 <<'PY'
          from pathlib import Path

          path = Path("daemon/dtnme.cc")
          text = path.read_text()
          original = text

          text = text.replace(
              """boost::asio::strand<
                  boost::asio::io_context::executor_type> strand_;""",
              """boost::asio::io_context::strand strand_;"""
          )

          text = text.replace(
              """boost::asio::strand<boost::asio::any_io_executor> strand_;""",
              """boost::asio::io_context::strand strand_;"""
          )

          text = text.replace(
              """, strand_(ws_.get_executor())""",
              """, strand_(static_cast<boost::asio::io_context&>(socket_.get_executor().context()))"""
          )

          if text == original:
              print("WARN: daemon/dtnme.cc was not changed; patch may already be applied.")

          if "boost::asio::io_context::strand strand_;" not in text:
              raise SystemExit("ERROR: strand declaration was not patched.")

          if "static_cast<boost::asio::io_context&>(socket_.get_executor().context())" not in text:
              raise SystemExit("ERROR: strand initialization was not patched.")

          path.write_text(text)
          PY

          grep -n "io_context::strand strand_" daemon/dtnme.cc
          grep -n "static_cast<boost::asio::io_context&>(socket_.get_executor().context())" daemon/dtnme.cc

      - name: Install SonarQube Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v8.1.0

      - name: Build DTNME and OASYS with Build Wrapper
        run: |
          set -e

          mkdir -p "${REPORTS_DIR}"
          : > "${REPORTS_DIR}/oasys-test-binaries.txt"

          build-wrapper-linux-x86-64 --out-dir "${BUILD_WRAPPER_OUT_DIR}" bash -s <<'BUILD_SCRIPT'
          set -e

          patch_rules_make_for_coverage() {
            local rules_file="$1"

            if [ ! -f "$rules_file" ]; then
              echo "ERROR: $rules_file not found"
              exit 1
            fi

            python3 - "$rules_file" <<'PY'
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          text = path.read_text()

          lines = text.splitlines()
          out = []

          for line in lines:
              if line.startswith("PROFILE ="):
                  out.append("PROFILE = --coverage")
              elif line.startswith("EXTRA_CFLAGS ="):
                  if "--coverage" not in line:
                      out.append(line + " --coverage -O0 -g -I/usr/include/tirpc")
                  else:
                      out.append(line)
              elif line.startswith("EXTRA_CXXFLAGS ="):
                  if "--coverage" not in line:
                      out.append(line + " --coverage -O0 -g -I/usr/include/tirpc")
                  else:
                      out.append(line)
              elif line.startswith("EXTRA_LDFLAGS ="):
                  if "--coverage" not in line:
                      out.append(line + " --coverage")
                  else:
                      out.append(line)
              else:
                  out.append(line)

          path.write_text("\n".join(out) + "\n")
          PY

            echo "==> Coverage flags in $rules_file"
            grep -E "^(PROFILE|EXTRA_CFLAGS|EXTRA_CXXFLAGS|EXTRA_LDFLAGS) =" "$rules_file"
          }

          echo "==> Configure and build OASYS"
          cd third_party/oasys

          chmod +x tools/extract-version tools/subst-version
          touch oasys-version.h

          sh build-configure.sh

          ./configure \
            CPPFLAGS="-I/usr/include/tirpc" \
            CFLAGS="-O0 -g --coverage -I/usr/include/tirpc" \
            CXXFLAGS="-O0 -g --coverage -I/usr/include/tirpc" \
            LDFLAGS="--coverage" \
            LIBS="-ltirpc"

          patch_rules_make_for_coverage "Rules.make"

          make -j "${BUILD_JOBS}"

          cd ../..

          echo "==> Configure and build DTNME"
          touch dtn-version.h

          sh build-configure.sh

          ./configure \
            CPPFLAGS="-I/usr/include/tirpc" \
            CFLAGS="-O0 -g --coverage -I/usr/include/tirpc" \
            CXXFLAGS="-O0 -g --coverage -I/usr/include/tirpc" \
            LDFLAGS="--coverage" \
            LIBS="-ltirpc"

          patch_rules_make_for_coverage "Rules.make"

          make -j "${BUILD_JOBS}"

          echo
          echo "==> Verifying main DTNME binary"

          DTNME_BIN="$(find daemon -maxdepth 2 -type f -perm -111 -name dtnme | head -n 1 || true)"

          if [ -z "${DTNME_BIN}" ]; then
            echo "ERROR: DTNME binary was not generated."
            echo "Executable files under daemon/:"
            find daemon -maxdepth 2 -type f -perm -111 -print || true
            exit 1
          fi

          echo "Found DTNME binary: ${DTNME_BIN}"

          echo
          echo "==> Building selected OASYS unit-test binaries"

          TESTS="
            base16-test
            buffer-test
            cache-test
            checked-log-test
            functor-test
            iterator-test
            log-test
            marshal-test
            msg-queue-test
            options-test
            optparser-test
            regex-test
            sample-test
            serialize-stream-test
            serialize-test
            sparse-array-test
            sparse-bitmap-test
            spin-lock-test
            static-buffer-test
            stream-serialize-test
            string-appender-test
            string-hash-test
            string-tokenize-test
            text-code-test
            timer-test
            token-bucket-test
            type-collection-test
            updatable-priority-queue-test
            uri-test
            util-test
            xml-test
          "

          for test_name in ${TESTS}; do
            test_src="third_party/oasys/test/${test_name}.cc"
            test_bin="third_party/oasys/test/${test_name}"

            if [ ! -f "${test_src}" ]; then
              echo "SKIP: ${test_src} does not exist"
              continue
            fi

            echo "Building ${test_bin}"

            if make -C third_party/oasys "test/${test_name}"; then
              echo "${test_bin}" >> reports/oasys-test-binaries.txt
            else
              echo "WARN: could not build ${test_name}; skipping it"
            fi
          done
          BUILD_SCRIPT

          echo "==> Verifying Build Wrapper output"
          test -s "${BUILD_WRAPPER_OUT_DIR}/compile_commands.json"

          echo "==> Checking coverage instrumentation files"
          GCNO_COUNT="$(find "$PWD" -name "*.gcno" | wc -l)"
          echo "Found .gcno files: ${GCNO_COUNT}"

          if [ "${GCNO_COUNT}" -lt 10 ]; then
            echo "ERROR: too few .gcno files were generated. Coverage instrumentation did not work."
            find "$PWD" -name "*.gcno" -print
            exit 1
          fi

      - name: Run OASYS unit tests and create Sonar generic test execution report
        run: |
          set -e

          mkdir -p "${REPORTS_DIR}"

          python3 <<'PY'
          import os
          import subprocess
          import sys
          import time
          import xml.etree.ElementTree as ET
          from pathlib import Path

          reports_dir = Path(os.environ.get("REPORTS_DIR", "reports"))
          binaries_file = reports_dir / "oasys-test-binaries.txt"
          output_xml = reports_dir / "test-execution.xml"
          fail_on_test_failure = os.environ.get("FAIL_ON_TEST_FAILURE", "false").lower() == "true"

          root = ET.Element("testExecutions", version="1")

          failures = 0
          executed = 0

          binaries = []
          if binaries_file.exists():
              binaries = [
                  line.strip()
                  for line in binaries_file.read_text().splitlines()
                  if line.strip()
              ]

          for binary in binaries:
              binary_path = Path(binary)
              source_path = Path(str(binary) + ".cc")

              if not binary_path.exists():
                  print(f"SKIP: binary does not exist: {binary_path}")
                  continue

              file_node = ET.SubElement(root, "file", path=str(source_path))
              start = time.time()

              try:
                  result = subprocess.run(
                      [str(binary_path)],
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      text=True,
                      timeout=60,
                  )
                  duration_ms = int((time.time() - start) * 1000)
              except subprocess.TimeoutExpired as exc:
                  duration_ms = int((time.time() - start) * 1000)

                  test_case = ET.SubElement(
                      file_node,
                      "testCase",
                      name=binary_path.name,
                      duration=str(duration_ms),
                  )

                  failure = ET.SubElement(
                      test_case,
                      "failure",
                      message="timeout",
                  )
                  failure.text = f"Test timed out after 60 seconds.\n{exc}"

                  failures += 1
                  executed += 1
                  continue

              test_case = ET.SubElement(
                  file_node,
                  "testCase",
                  name=binary_path.name,
                  duration=str(duration_ms),
              )

              if result.returncode != 0:
                  failure = ET.SubElement(
                      test_case,
                      "failure",
                      message=f"exit code {result.returncode}",
                  )
                  failure.text = (
                      "STDOUT:\n"
                      + result.stdout[-4000:]
                      + "\n\nSTDERR:\n"
                      + result.stderr[-4000:]
                  )
                  failures += 1

              executed += 1

          tree = ET.ElementTree(root)
          ET.indent(tree, space="  ")
          tree.write(output_xml, encoding="utf-8", xml_declaration=True)

          print(f"Wrote {output_xml}")
          print(f"Executed tests: {executed}")
          print(f"Failed tests: {failures}")

          if executed == 0:
              print("ERROR: no OASYS test binaries were executed.")
              sys.exit(1)

          if failures and fail_on_test_failure:
              sys.exit(1)
          PY

          echo "==> Checking generated runtime coverage data"
          GCDA_COUNT="$(find "$PWD" -name "*.gcda" | wc -l)"
          echo "Found .gcda files: ${GCDA_COUNT}"

          if [ "${GCDA_COUNT}" -eq 0 ]; then
            echo "ERROR: no .gcda files were generated. Tests did not produce runtime coverage data."
            exit 1
          fi

      - name: Generate SonarQube coverage report with gcovr
        run: |
          set -e

          mkdir -p "${REPORTS_DIR}"

          echo "==> gcovr version"
          gcovr --version

          echo "==> Coverage raw files"
          find "$PWD" \( -name "*.gcda" -o -name "*.gcno" \) | head -n 200 || true

          gcovr \
            --root "$PWD" \
            --object-directory "$PWD" \
            --sonarqube "${REPORTS_DIR}/coverage-sonarqube.xml" \
            --filter "$PWD/applib/.*" \
            --filter "$PWD/apps/.*" \
            --filter "$PWD/daemon/.*" \
            --filter "$PWD/ehsrouter/.*" \
            --filter "$PWD/servlib/.*" \
            --filter "$PWD/third_party/oasys/.*" \
            --exclude "$PWD/third_party/oasys/test/.*" \
            --exclude "$PWD/third_party/tinycbor/.*" \
            --exclude "$PWD/build-wrapper-output/.*" \
            --exclude "$PWD/reports/.*" \
            --exclude "$PWD/.git/.*" \
            --gcov-ignore-errors all \
            --gcov-ignore-parse-errors all \
            --print-summary

          test -s "${REPORTS_DIR}/coverage-sonarqube.xml"

          echo "==> Coverage report generated:"
          ls -lh "${REPORTS_DIR}/coverage-sonarqube.xml"

      - name: Upload CI reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dtnme-sonar-reports
          path: |
            reports/
            build-wrapper-output/
          retention-days: 7

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}