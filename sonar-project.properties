sonar.projectKey=Javier-Sinuka_DTNME
sonar.organization=javier-sinuka

sonar.projectName=DTNME
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

# Código a analizar.
# Incluyo third_party/oasys porque DTNME lo compila como dependencia interna
# y ahí están los unit tests visibles del repositorio.
sonar.sources=applib,apps,daemon,ehsrouter,servlib,third_party/oasys,dtn-version.c,dtn-version.h.in

# Tests detectados para reporte de ejecución.
sonar.tests=third_party/oasys/test
sonar.test.inclusions=third_party/oasys/test/**/*-test.cc,third_party/oasys/test/**/*Test.cc

# Build Wrapper genera este archivo durante el workflow.
sonar.cfamily.compile-commands=build-wrapper-output/compile_commands.json

# Reportes generados en GitHub Actions.
sonar.coverageReportPaths=reports/coverage-sonarqube.xml
sonar.testExecutionReportPaths=reports/test-execution.xml

# Exclusiones para no analizar build outputs, cachés, binarios, documentación y tests como source.
sonar.exclusions=\
build/**,\
build-wrapper-output/**,\
reports/**,\
.sonar/**,\
.git/**,\
.github/**,\
**/*.o,\
**/*.a,\
**/*.so,\
**/*.gcno,\
**/*.gcda,\
**/*.gcov,\
**/Makefile,\
**/config.log,\
**/config.status,\
**/autom4te.cache/**,\
**/aclocal.m4,\
**/configure,\
**/dtn-config.h,\
**/Rules.make,\
**/System.make,\
third_party/oasys/test/**,\
third_party/tinycbor/**,\
**/*.docx

# Evita que los tests afecten el cálculo de coverage del código productivo.
sonar.coverage.exclusions=\
third_party/oasys/test/**,\
**/*-test.cc,\
**/*Test.cc

# Evita duplicación excesiva en código generado o de build.
sonar.cpd.exclusions=\
**/dtn_types_xdr.c,\
**/dtpc_types_xdr.c,\
**/*_wrap.cc