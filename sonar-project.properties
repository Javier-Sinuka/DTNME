sonar.projectKey=Javier-Sinuka_DTNME
sonar.organization=javier-sinuka

sonar.projectName=DTNME
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

sonar.sources=applib,apps,daemon,ehsrouter,servlib,third_party/oasys,dtn-version.c,dtn-version.h.in

sonar.tests=third_party/oasys/test
sonar.test.inclusions=third_party/oasys/test/**/*-test.cc,third_party/oasys/test/**/*Test.cc

sonar.cfamily.compile-commands=build-wrapper-output/compile_commands.json

sonar.coverageReportPaths=reports/coverage-sonarqube.xml
sonar.testExecutionReportPaths=reports/test-execution.xml

sonar.python.version=3.10

sonar.exclusions=\
build/**,\
build-wrapper-output/**,\
reports/**,\
.sonar/**,\
.git/**,\
.github/**,\
**/*.o,\
**/*.a,\
**/*.so,\
**/*.gcno,\
**/*.gcda,\
**/*.gcov,\
**/Makefile,\
**/config.log,\
**/config.status,\
**/autom4te.cache/**,\
**/aclocal.m4,\
**/configure,\
**/dtn-config.h,\
**/Rules.make,\
**/System.make,\
third_party/oasys/test/**,\
third_party/tinycbor/**,\
**/*.docx

sonar.coverage.exclusions=\
third_party/oasys/test/**,\
**/*-test.cc,\
**/*Test.cc

sonar.cpd.exclusions=\
**/dtn_types_xdr.c,\
**/dtpc_types_xdr.c,\
**/*_wrap.cc